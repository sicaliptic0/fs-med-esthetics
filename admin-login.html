<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | FS Med-Esthetics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-[#FCFAF7] h-screen flex items-center justify-center font-['Outfit']">

    <div class="w-full max-w-md p-10 bg-white rounded-2xl shadow-xl border border-[#E9E0D2]">
        <div class="text-center mb-10">
            <h1 class="text-[#B59A6D] text-xs uppercase tracking-[0.2em] font-bold mb-2">Internal Access Only</h1>
            <h2 class="text-3xl italic font-serif text-[#5D534A]">Provider Login</h2>
        </div>

        <form id="admin-login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] uppercase tracking-widest opacity-40 mb-2">Staff Email</label>
                <input type="email" id="admin-email" required class="w-full p-4 bg-[#FCFAF7] border border-[#E9E0D2] outline-none focus:border-[#B59A6D] text-sm">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-widest opacity-40 mb-2">Secret Password</label>
                <div class="relative">
                    <input type="password" id="admin-password" required class="w-full p-4 bg-[#FCFAF7] border border-[#E9E0D2] outline-none focus:border-[#B59A6D] text-sm pr-12">
                    <button type="button" onclick="toggleAdminPassword()" tabindex="-1" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#5D534A] opacity-40 hover:opacity-80 transition">
                        <span id="admin-eye"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></span>
                    </button>
                </div>
            </div>
            <button type="submit" class="w-full bg-[#5D534A] text-white py-4 uppercase text-[10px] tracking-widest font-bold hover:bg-[#B59A6D] transition duration-300 shadow-md">
                Authenticate Access
            </button>
            <div class="text-center pt-1">
                <button type="button" onclick="sendAdminPasswordReset()" class="text-[10px] uppercase tracking-widest text-[#B59A6D] opacity-60 hover:opacity-100 transition">
                    Forgot Password / Reset Access
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qkjmrnqkoipdltauweub.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFram1ybnFrb2lwZGx0YXV3ZXViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkyMjgsImV4cCI6MjA4OTA5NTIyOH0.EGqgJ9RNY9vYfuVeeEcGoMu_cIaygRq0hnyT-iE7zTw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleAdminPassword() {
            const input = document.getElementById('admin-password');
            const eye = document.getElementById('admin-eye');
            const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
            const eyeOff = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`;
            if (input.type === 'password') { input.type = 'text'; eye.innerHTML = eyeOff; }
            else { input.type = 'password'; eye.innerHTML = eyeOpen; }
        }

        async function sendAdminPasswordReset() {
            const email = document.getElementById('admin-email').value.trim();
            if (!email) { alert('Please enter your staff email first.'); return; }
            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html'
            });
            if (error) alert('Error: ' + error.message);
            else alert('Password reset link sent to ' + email + '. Check your inbox (and spam folder).');
        }

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Unauthorized: " + error.message);
            } else {
                // The critical part: Redirect to ADMIN.HTML instead of DASHBOARD.HTML
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>

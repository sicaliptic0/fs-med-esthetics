<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Admin | FS Med-Esthetics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfaf7; color: #5d534a; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        .admin-sidebar { background-color: #ffffff; border-right: 1px solid #e9e0d2; }
        .nav-link { cursor: pointer; transition: 0.3s; }
        .active-link { background-color: #fcfaf7; color: #b59a6d; border-right: 4px solid #b59a6d; font-weight: bold; opacity: 1 !important; }
        .status-badge { font-size: 8px; padding: 2px 8px; border-radius: 99px; text-transform: uppercase; font-weight: bold; }
        .status-pending { background-color: #FEF3C7; color: #92400E; }
        .status-confirmed { background-color: #D1FAE5; color: #065F46; }
        input, textarea, select { border: 1px solid #e9e0d2; background: #fff; padding: 10px; border-radius: 8px; outline-color: #b59a6d; width: 100%; font-size: 14px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 admin-sidebar flex flex-col p-6 z-10 relative">
        <h1 class="text-[#b59a6d] text-xl tracking-widest font-bold mb-10 text-center">FS ADMIN</h1>
        <nav class="flex-1 space-y-2">
            <a onclick="switchAdminView('patients-view', this)" class="nav-link active-link block px-4 py-3 text-[10px] uppercase tracking-widest">Patients</a>
            <a onclick="switchAdminView('appointments-view', this)" class="nav-link block px-4 py-3 opacity-60 hover:opacity-100 text-[10px] uppercase tracking-widest">Appointments</a>
        </nav>
        <button onclick="logout()" class="text-[10px] uppercase tracking-widest opacity-40 hover:opacity-100 transition mt-auto">Logout</button>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-[#FCFAF7]">
        <header class="h-20 bg-white border-b border-[#e9e0d2] flex items-center justify-between px-12 z-0">
            <h2 id="view-title" class="text-2xl italic">Patient Database</h2>
            <button onclick="openAdminBooking()" class="bg-[#b59a6d] text-white px-6 py-2 text-[10px] uppercase tracking-widest font-bold shadow-md hover:bg-[#9e865e] transition rounded-full">New Appointment</button>
        </header>

        <div id="patients-view" class="flex-1 overflow-y-auto p-12">
            <div class="bg-white rounded-xl shadow-sm border border-[#e9e0d2] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] uppercase tracking-widest opacity-60">
                        <tr>
                            <th class="p-6">Patient Name</th>
                            <th class="p-6">DOB</th>
                            <th class="p-6">Sex</th>
                            <th class="p-6">Phone</th>
                            <th class="p-6">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="patient-table-body" class="text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="appointments-view" class="flex-1 overflow-y-auto p-12 hidden">
            <div class="bg-white rounded-xl shadow-sm border border-[#e9e0d2] overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] uppercase tracking-widest opacity-60">
                        <tr>
                            <th class="p-6">Patient</th>
                            <th class="p-6">Procedure</th>
                            <th class="p-6">Date/Time</th>
                            <th class="p-6">Status</th>
                            <th class="p-6">Action</th>
                        </tr>
                    </thead>
                    <tbody id="appointment-table-body" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="history-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-5xl h-[90vh] p-8 rounded-2xl shadow-2xl flex flex-col relative overflow-hidden">
            <button onclick="closeHistoryModal()" class="absolute top-6 right-8 text-2xl opacity-30 hover:opacity-100 z-20">&times;</button>
            
            <div class="mb-6 z-10">
                <h3 class="text-3xl italic">Clinical History: <span id="history-patient-name" class="font-bold"></span></h3>
                <p class="text-[10px] uppercase tracking-widest opacity-40">Longitudinal Medical Record</p>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <button id="add-note-btn" onclick="toggleSoapForm(true)" class="bg-[#b59a6d] text-white px-6 py-2 text-[10px] uppercase tracking-widest font-bold rounded-full shadow-sm hover:bg-[#9e865e] transition">Add New Encounter</button>
                </div>

                <div id="notes-container" class="flex-1 overflow-y-auto pr-4 space-y-6 pb-10">
                    </div>

                <div id="soap-form-container" class="hidden absolute inset-0 bg-white flex flex-col z-30 rounded-2xl overflow-y-auto">
                    <div class="flex justify-between items-center mb-6 pt-2">
                        <h4 class="text-xl italic" id="form-title">New Clinical Entry</h4>
                        <button onclick="toggleSoapForm(false)" class="text-[10px] uppercase underline opacity-40 hover:opacity-100 transition">Cancel / Back to Timeline</button>
                    </div>
                    <form id="soap-form" class="space-y-4 pb-10">
                        <input type="hidden" id="edit-note-id">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] uppercase font-bold opacity-40 mb-1 block">Visit Date</label>
                                <input type="date" id="soap-date" required>
                            </div>
                            <div>
                                <label class="text-[9px] uppercase font-bold opacity-40 mb-1 block">Visit Time</label>
                                <input type="time" id="soap-time" required>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <textarea id="soap-s" placeholder="Subjective (S) - Patient concerns, updates" class="h-32 resize-none"></textarea>
                            <textarea id="soap-o" placeholder="Objective (O) - Physical exam, findings" class="h-32 resize-none"></textarea>
                            <textarea id="soap-a" placeholder="Assessment/Evolution (A) - Diagnosis" class="h-32 resize-none"></textarea>
                            <textarea id="soap-p" placeholder="Plan/Treatment (P) - Procedures, dosage, orders" class="h-32 resize-none"></textarea>
                        </div>
                        <textarea id="soap-sugg" placeholder="Follow-up Suggestions & Post-procedure Instructions" class="h-20 resize-none"></textarea>
                        <button type="submit" class="w-full bg-[#5d534a] text-white py-4 uppercase text-[10px] tracking-widest font-bold hover:bg-[#b59a6d] transition shadow-md rounded-lg mt-2">Save Clinical Record</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-booking-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-6 backdrop-blur-sm">
        <div class="bg-white p-10 max-w-md w-full rounded-2xl shadow-2xl relative">
            <h3 class="text-2xl mb-6 italic">Direct Admin Booking</h3>
            <form id="admin-booking-form" class="space-y-4 flex flex-col">
                <select id="admin-book-patient" class="text-sm" required>
                    <option value="">Select Patient...</option>
                </select>
                <select id="admin-book-service" class="text-sm" required>
                    <option value="botox">Facial Neurotoxins</option>
                    <option value="fillers">Dermal Fillers</option>
                    <option value="prp">PRP Restoration</option>
                    <option value="consult">General Assessment</option>
                </select>
                <input type="date" id="admin-book-date" class="text-sm" required>
                <input type="time" id="admin-book-time" class="text-sm" required>
                <button type="submit" class="bg-[#b59a6d] text-white py-3 uppercase text-[10px] tracking-widest font-bold rounded-lg hover:bg-[#9e865e] transition shadow-md mt-2">Schedule Appointment</button>
                <button type="button" onclick="closeAdminBooking()" class="text-[9px] uppercase opacity-40 hover:opacity-100 transition mt-2">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qkjmrnqkoipdltauweub.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFram1ybnFrb2lwZGx0YXV3ZXViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkyMjgsImV4cCI6MjA4OTA5NTIyOH0.EGqgJ9RNY9vYfuVeeEcGoMu_cIaygRq0hnyT-iE7zTw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentPatientId = null;
        let notesById = {};

        // Basic HTML escape to prevent any stored content from breaking the DOM.
        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // --- CORE NAVIGATION & AUTH ---
        async function checkAdmin() {
            const { data: { user } } = await _supabase.auth.getUser();
            const admins = ['samuel.galviz@gmail.com', 'freddyjosevp@gmail.com']; // Updated email
            if (!user || !admins.includes(user.email)) { window.location.href = 'index.html'; return; }
            fetchPatients();
        }

        function switchAdminView(viewId, element) {
            document.getElementById('patients-view').classList.add('hidden');
            document.getElementById('appointments-view').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active-link'));
            element.classList.add('active-link');
            document.getElementById('view-title').innerText = viewId === 'patients-view' ? 'Patient Database' : 'Appointment Queue';

            if(viewId === 'appointments-view') fetchAppointments();
            else fetchPatients();
        }

        // --- PATIENT FETCHING ---
        async function fetchPatients() {
            const { data, error } = await _supabase.from('profiles').select('*').order('last_name');
            if (error) { console.error("Fetch Patients Error:", error); return; }
            renderPatientTable(data || []);
            
            // This is the part that crashed last time because the modal was missing!
            const select = document.getElementById('admin-book-patient');
            if(select) {
                select.innerHTML = '<option value="">Select Patient...</option>' + 
                    data.map(p => `<option value="${p.id}">${p.last_name}, ${p.first_name}</option>`).join('');
            }
        }

        function renderPatientTable(patients) {
            document.getElementById('patient-table-body').innerHTML = patients.map(p => `
                <tr class="border-t border-gray-50 hover:bg-gray-50 transition">
                    <td class="p-6 font-medium">${p.last_name}, ${p.first_name}</td>
                    <td class="p-6 text-xs">${p.dob}</td>
                    <td class="p-6 text-xs capitalize">${p.sex || '-'}</td>
                    <td class="p-6 text-xs">${p.phone || '-'}</td>
                    <td class="p-6">
                        <button onclick="openHistory('${p.id}', '${p.first_name} ${p.last_name}')" class="text-[#b59a6d] font-bold text-[10px] uppercase hover:underline">History (SOAP)</button>
                    </td>
                </tr>
            `).join('');
        }

        // --- APPOINTMENTS FETCHING ---
        async function fetchAppointments() {
            const { data, error } = await _supabase.from('appointments').select('*, profiles(first_name, last_name)').order('appointment_date', { ascending: false });
            if (error) { console.error("Fetch Appts Error:", error); return; }
            
            document.getElementById('appointment-table-body').innerHTML = data.map(appt => `
                <tr class="border-t border-gray-50 hover:bg-gray-50 transition">
                    <td class="p-6 font-medium">${appt.profiles?.last_name || 'N/A'}, ${appt.profiles?.first_name || ''}</td>
                    <td class="p-6 uppercase text-[9px] tracking-widest">${appt.service_type}</td>
                    <td class="p-6 text-xs">${appt.appointment_date} @ ${appt.appointment_time.substring(0,5)}</td>
                    <td class="p-6"><span class="status-badge status-${appt.status}">${appt.status}</span></td>
                    <td class="p-6">
                        ${appt.status === 'pending' ? `<button onclick="updateStatus('${appt.id}', 'confirmed')" class="text-green-600 font-bold text-[10px] uppercase hover:underline">Confirm</button>` : `<span class="opacity-20 text-[9px] uppercase">Vetted</span>`}
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, newStatus) {
            await _supabase.from('appointments').update({ status: newStatus }).eq('id', id);
            fetchAppointments();
        }

        // --- CLINICAL HISTORY (SOAP) LOGIC ---
        async function openHistory(patientId, name) {
            currentPatientId = patientId;
            document.getElementById('history-patient-name').innerText = name;
            document.getElementById('history-modal').classList.remove('hidden');
            loadNotes();
        }

        function toggleSoapForm(show, note = null) {
            const container = document.getElementById('soap-form-container');
            container.classList.toggle('hidden', !show);
            
            if(show) {
                if(note) {
                    document.getElementById('form-title').innerText = "Modify Clinical Encounter";
                    document.getElementById('edit-note-id').value = note.id;
                    document.getElementById('soap-date').value = note.visit_date;
                    document.getElementById('soap-time').value = note.visit_time || '';
                    document.getElementById('soap-s').value = note.subjective || '';
                    document.getElementById('soap-o').value = note.objective || '';
                    document.getElementById('soap-a').value = note.assessment || '';
                    document.getElementById('soap-p').value = note.plan || '';
                    document.getElementById('soap-sugg').value = note.suggestions || '';
                } else {
                    document.getElementById('form-title').innerText = "New Clinical Entry";
                    document.getElementById('soap-form').reset();
                    document.getElementById('edit-note-id').value = "";
                    const now = new Date();
                    // Setup correct local time offset
                    const offset = now.getTimezoneOffset() * 60000;
                    const localISOTime = (new Date(now - offset)).toISOString().slice(0, -1);
                    document.getElementById('soap-date').value = localISOTime.split('T')[0];
                    document.getElementById('soap-time').value = localISOTime.split('T')[1].substring(0, 5);
                }
            }
        }

        async function loadNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = '<p class="text-center opacity-30 text-sm mt-10">Accessing secure records...</p>';
            
            const { data, error } = await _supabase
                .from('clinical_history')
                .select('*')
                .eq('patient_id', currentPatientId)
                .order('visit_date', { ascending: false })
                .order('visit_time', { ascending: false });

            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                        <p class="opacity-40 italic text-sm mb-4">No clinical history found for this patient.</p>
                        <p class="text-[10px] uppercase tracking-widest opacity-30">Start by adding a new encounter above.</p>
                    </div>`;
                return;
            }

            notesById = {};
            data.forEach(n => {
                if (n && n.id) notesById[n.id] = n;
            });

            container.innerHTML = data.map(n => `
                <div class="p-6 bg-white border border-[#e9e0d2] rounded-xl shadow-sm relative group hover:border-[#b59a6d] transition-colors">
                    <div class="flex justify-between items-start mb-4 border-b border-gray-50 pb-3">
                        <div>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-[#b59a6d]">Encounter: ${escapeHtml(n.visit_date)} @ ${n.visit_time ? escapeHtml(String(n.visit_time).substring(0,5)) : 'N/A'}</span>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <button onclick='editNoteById("${n.id}")' class="text-[9px] uppercase font-bold text-blue-500 hover:text-blue-700 underline transition">Modify</button>
                            <button onclick='deleteNote("${n.id}")' class="text-[9px] uppercase font-bold text-red-400 hover:text-red-600 underline transition">Delete</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-x-8 gap-y-6 text-xs leading-relaxed mt-2">
                        <div><p class="font-bold opacity-30 uppercase text-[7px] mb-1 tracking-widest">Subjective</p><p class="text-gray-700 whitespace-pre-wrap">${escapeHtml(n.subjective || '-')}</p></div>
                        <div><p class="font-bold opacity-30 uppercase text-[7px] mb-1 tracking-widest">Objective</p><p class="text-gray-700 whitespace-pre-wrap">${escapeHtml(n.objective || '-')}</p></div>
                        <div><p class="font-bold opacity-30 uppercase text-[7px] mb-1 tracking-widest">Assessment</p><p class="text-gray-700 font-medium whitespace-pre-wrap">${escapeHtml(n.assessment || '-')}</p></div>
                        <div><p class="font-bold opacity-30 uppercase text-[7px] mb-1 tracking-widest">Plan</p><p class="text-gray-700 whitespace-pre-wrap">${escapeHtml(n.plan || '-')}</p></div>
                    </div>
                    ${n.suggestions ? `<div class="mt-5 pt-4 border-t border-gray-50 text-[10px]"><span class="font-bold text-[#b59a6d] uppercase tracking-widest text-[8px] mr-2">Suggestions:</span> <span class="italic text-gray-500">${escapeHtml(n.suggestions)}</span></div>` : ''}
                </div>
            `).join('');
        }

        window.editNoteById = (noteId) => {
            const note = notesById[noteId];
            if (!note) return;
            toggleSoapForm(true, note);
        };

        async function deleteNote(id) {
            if (confirm("Are you sure you want to permanently delete this clinical record?")) {
                await _supabase.from('clinical_history').delete().eq('id', id);
                loadNotes();
            }
        }

        document.getElementById('soap-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-note-id').value;
            const noteData = {
                patient_id: currentPatientId,
                visit_date: document.getElementById('soap-date').value,
                visit_time: document.getElementById('soap-time').value,
                subjective: document.getElementById('soap-s').value,
                objective: document.getElementById('soap-o').value,
                assessment: document.getElementById('soap-a').value,
                plan: document.getElementById('soap-p').value,
                suggestions: document.getElementById('soap-sugg').value
            };

            let result;
            if(id) result = await _supabase.from('clinical_history').update(noteData).eq('id', id);
            else result = await _supabase.from('clinical_history').insert([noteData]);

            if (!result.error) {
                toggleSoapForm(false);
                loadNotes();
            } else {
                alert("Database Error: " + result.error.message);
            }
        };

        function closeHistoryModal() { document.getElementById('history-modal').classList.add('hidden'); }

        // --- ADMIN BOOKING LOGIC ---
        function openAdminBooking() { document.getElementById('admin-booking-modal').classList.remove('hidden'); }
        function closeAdminBooking() { document.getElementById('admin-booking-modal').classList.add('hidden'); }

        document.getElementById('admin-booking-form').onsubmit = async (e) => {
            e.preventDefault();
            const appt = {
                patient_id: document.getElementById('admin-book-patient').value,
                service_type: document.getElementById('admin-book-service').value,
                appointment_date: document.getElementById('admin-book-date').value,
                appointment_time: document.getElementById('admin-book-time').value,
                status: 'confirmed'
            };
            await _supabase.from('appointments').insert([appt]);
            closeAdminBooking();
            if(document.getElementById('appointments-view').classList.contains('hidden') === false) {
                fetchAppointments();
            }
        };

        async function logout() { await _supabase.auth.signOut(); window.location.href = 'index.html'; }
        window.onload = checkAdmin;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | FS Med-Esthetics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #FCFAF7; color: #5D534A; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        .logo-font { font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }
        .btn-gold { background-color: #B59A6D; color: white; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-6 relative">

    <!-- Logo Superior -->
    <div class="absolute top-10 text-center w-full">
        <span class="logo-font text-lg md:text-xl text-[#5D534A]">FS Med-Esthetics</span>
    </div>

    <!-- Tarjeta de Reset -->
    <div class="bg-white p-8 md:p-12 max-w-md w-full rounded-xl shadow-2xl border border-[#E9E0D2] text-center">
        <h1 class="text-3xl font-light mb-2 text-[#5D534A] uppercase tracking-widest">Reset Password</h1>
        <p class="text-[10px] uppercase tracking-widest opacity-60 mb-8 text-[#B59A6D]">Secure your clinical account</p>

        <div class="space-y-4">
            <input type="password" id="new-password" placeholder="New Password / Nueva Contraseña" class="w-full p-4 border border-[#E9E0D2] outline-none focus:border-[#B59A6D] bg-[#FCFAF7] text-sm text-[#5D534A]">
            <input type="password" id="confirm-password" placeholder="Confirm Password / Confirmar Contraseña" class="w-full p-4 border border-[#E9E0D2] outline-none focus:border-[#B59A6D] bg-[#FCFAF7] text-sm text-[#5D534A]">
            
            <button id="update-btn" class="btn-gold w-full py-4 uppercase text-xs tracking-widest transition hover:bg-[#9E865E] flex justify-center items-center gap-2 mt-4 shadow-md">
                <span id="btn-text">Update Password</span>
                <svg id="spinner" class="animate-spin h-4 w-4 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </div>
        
        <p class="text-[10px] opacity-40 mt-6">* Require minimum 6 characters.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Configuración de Supabase (Ya con tus llaves reales)
        const SUPABASE_URL = 'https://qkjmrnqkoipdltauweub.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFram1ybnFrb2lwZGx0YXV3ZXViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTkyMjgsImV4cCI6MjA4OTA5NTIyOH0.EGqgJ9RNY9vYfuVeeEcGoMu_cIaygRq0hnyT-iE7zTw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('update-btn').addEventListener('click', async () => {
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');
            const btn = document.getElementById('update-btn');

            // Validaciones locales
            if (newPass.length < 6) {
                return alert("La contraseña debe tener al menos 6 caracteres. / Password must be at least 6 characters.");
            }
            if (newPass !== confirmPass) {
                return alert("Las contraseñas no coinciden. / Passwords do not match.");
            }

            // UI: Cargando
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            btn.disabled = true;

            // 2. VERIFICAR QUE EXISTE UNA SESIÓN DEL LINK DEL CORREO
            const { data: { session }, error: sessionError } = await _supabase.auth.getSession();
            
            if (!session) {
                // Si abrieron la página manualmente sin usar el link del correo, fallará aquí.
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
                btn.disabled = false;
                return alert("Error: Enlace inválido o expirado. Por favor, solicita un nuevo enlace desde la página de inicio.");
            }

            // 3. ACTUALIZAR LA CONTRASEÑA
            const { error } = await _supabase.auth.updateUser({ password: newPass });

            // UI: Restaurar
            btnText.classList.remove('hidden');
            spinner.classList.add('hidden');
            btn.disabled = false;

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("¡Contraseña actualizada con éxito! Serás redirigido a la página principal. / Password updated successfully!");
                // Cerramos sesión por seguridad para que inicie sesión con su nueva clave en el home
                await _supabase.auth.signOut();
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
